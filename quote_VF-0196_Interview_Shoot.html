<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your quote is being prepared — Valley Films</title>
<link rel="icon" type="image/x-icon" href="https://valley.film/assets/favicon.ico">
<link rel="icon" type="image/png" href="https://valley.film/assets/favicon-mark-blue.png" media="(prefers-color-scheme: light)">
<link rel="icon" type="image/png" sizes="32x32" href="https://valley.film/assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://valley.film/assets/apple-touch-icon.png">
<meta http-equiv="refresh" content="20">
<style>
  @font-face {
    font-family: "Acumin Pro";
    src: url("https://valley.film/fonts/Acumin-RPro.otf") format("opentype");
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: "Acumin Pro";
    src: url("https://valley.film/fonts/Acumin-BdPro.otf") format("opentype");
    font-weight: 700; font-style: normal; font-display: swap;
  }
  @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap");

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --vf-blue: #095EDF;
    --vf-blue-500: #2A78EA;
    --vf-ink: #0A0F1A;
    --vf-ink-3: rgba(10,15,26,0.55);
    --vf-bg: #F7F8FA;
    --font-sans: "Acumin Pro", -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
  }

  body {
    font-family: var(--font-sans);
    background: var(--vf-bg);
    color: var(--vf-ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 70% at 20% 30%, rgba(9,94,223,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 80% 70%, rgba(9,94,223,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: white;
    border: 1px solid rgba(10,15,26,0.08);
    border-radius: 20px;
    padding: 56px 48px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    box-shadow: 0 24px 72px rgba(10,15,26,0.06), 0 4px 12px rgba(10,15,26,0.03);
  }

  .logo {
    height: 28px;
    margin: 0 auto 36px;
    opacity: 0.92;
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--vf-ink-3);
    margin-bottom: 14px;
  }

  h1 {
    font-family: var(--font-sans);
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.1;
    margin-bottom: 16px;
    text-wrap: balance;
  }
  h1 em {
    font-style: italic;
    font-weight: 500;
    color: var(--vf-blue);
  }

  .lede {
    font-size: 15px;
    color: var(--vf-ink-3);
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 380px;
    margin-left: auto;
    margin-right: auto;
  }

  .dots {
    display: inline-flex;
    gap: 6px;
    margin-bottom: 32px;
  }
  .dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--vf-blue);
    opacity: 0.3;
    animation: dot-pulse 1.4s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.18s; }
  .dots span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes dot-pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
    40% { opacity: 1; transform: scale(1.2); }
  }

  .foot {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--vf-ink-3);
    letter-spacing: 0.04em;
    margin-top: 24px;
  }
  .foot a {
    color: var(--vf-blue);
    text-decoration: none;
    font-weight: 600;
  }
  .foot a:hover { color: var(--vf-blue-500); }

  .ref {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--vf-ink-3);
    background: rgba(9,94,223,0.06);
    padding: 6px 12px;
    border-radius: 999px;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="https://valley.film/assets/logo-black.png" alt="Valley Films" onerror="this.style.display='none'">
    <div class="eyebrow">Quote in progress</div>
    <h1>Your quote is <em>almost ready</em></h1>
    <p class="lede">We're putting the finishing touches on your quotation. This page will refresh automatically — please check back in a moment.</p>
    <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
    <div class="foot">
      Need it sooner? <a href="mailto:info@valley.film">info@valley.film</a>
    </div>
    <div class="ref">VF-0196 · Interview Shoot</div>
  </div>
</body>
</html>
